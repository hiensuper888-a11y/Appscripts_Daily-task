<!-- Login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Daily Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; /* Deep Violet Blue */
            --secondary: #06b6d4; /* Vibrant Teal */
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            /* Animated gradient background */
            background: linear-gradient(-45deg, #4f46e5, #0ea5e9, #06b6d4, #6366f1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Abstract shapes behind cards */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #a855f7;
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }
        .shape-2 {
            width: 350px;
            height: 350px;
            background: #2dd4bf;
            bottom: -50px;
            right: -50px;
            border-radius: 50%;
        }

        .auth-container {
            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .auth-header {
            padding: 40px 30px 20px;
            text-align: center;
            position: relative;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            display: block;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .auth-header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .auth-header p {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-light);
        }

        .google-account-badge {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 20px;
            border: 1px solid rgba(79, 70, 229, 0.2);
        }

        .tabs {
            display: flex;
            padding: 0 30px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            color: var(--text-light);
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            font-size: 15px;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: transform 0.3s ease;
            border-radius: 3px 3px 0 0;
        }

        .tab.active {
            color: var(--primary);
            font-weight: 600;
        }

        .tab.active::after {
            transform: scaleX(1);
        }

        .form-container {
            padding: 10px 40px 40px;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            border-color: var(--secondary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
        }
        
        .form-control:disabled {
            background-color: rgba(241, 245, 249, 0.8);
            color: #94a3b8;
            cursor: not-allowed;
            border-color: transparent;
        }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }
        
        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .msg-box {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .msg-error {
            background-color: rgba(254, 226, 226, 0.9);
            color: var(--error);
            border-left: 4px solid var(--error);
        }
        
        .msg-success {
            background-color: rgba(209, 250, 229, 0.9);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        
        .btn.loading span { display: none; }
        .btn.loading .spinner { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-text {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 6px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <!-- Inline SVG Logo -->
            <div style="background: linear-gradient(135deg, var(--primary), var(--secondary)); width: 70px; height: 70px; margin: 0 auto 15px; border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <h1>Daily Task Manager</h1>
            <p>Không gian làm việc & Quản lý dự án tối ưu</p>
            <div class="google-account-badge">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                <span id="googleEmailDisp"><?= data.userEmail ?></span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
            <div class="tab" onclick="switchTab('register')">Đăng ký mới</div>
        </div>

        <div class="form-container">
            <div id="global-msg" class="msg-box"></div>

            <!-- LOGIN SECTION -->
            <div id="login-section" class="form-section active">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Tài khoản Email</label>
                        <input type="email" class="form-control" name="email" required placeholder="nhapemail@gmail.com">
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu ứng dụng</label>
                        <input type="password" class="form-control" name="password" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn" id="btnLogin">
                        <span>Đăng nhập bằng mật khẩu</span>
                        <div class="spinner"></div>
                    </button>
                    
                    <div style="text-align: center; margin: 20px 0; color: var(--text-light); font-size: 13px;">HOẶC</div>
                    
                    <button type="button" class="btn" id="btnGoogleLogin" onclick="handleGoogleLogin()" style="background: white; color: var(--text-dark); border: 1px solid #e2e8f0; margin-top: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align: middle; margin-right: 8px;"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                        <span>Đăng nhập qua Google (Auto)</span>
                        <div class="spinner" style="border-top-color: var(--primary);"></div>
                    </button>
                </form>
            </div>

            <!-- REGISTER SECTION -->
            <div id="register-section" class="form-section">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Tài khoản Email đăng ký</label>
                        <input type="email" class="form-control" name="email" required placeholder="example@gmail.com">
                    </div>

                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" class="form-control" name="name" required placeholder="Nguyễn Văn A">
                    </div>
                    
                    <div class="row">
                        <div class="col form-group">
                            <label>Số điện thoại</label>
                            <input type="tel" class="form-control" name="phone" required placeholder="0912xxx">
                        </div>
                        <div class="col form-group">
                            <label>Ngày sinh</label>
                            <input type="date" class="form-control" name="dob">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col form-group">
                            <label>Giới tính</label>
                            <select class="form-control" name="gender">
                                <option value="male">Nam</option>
                                <option value="female">Nữ</option>
                                <option value="other">Khác</option>
                            </select>
                        </div>
                        <div class="col form-group">
                            <label>Mật khẩu App</label>
                            <input type="password" class="form-control" name="password" id="regPassword" required placeholder="An toàn 6 ký tự">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <input type="text" class="form-control" name="address" placeholder="Tỉnh/Thành phố hiện tại">
                    </div>
                    
                    <button type="submit" class="btn" id="btnRegister">
                        <span>Hoàn tất đăng ký</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var savedSid = localStorage.getItem('dtm_sid');
            var urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('sid')) {
                // If sid is in URL but server rendered Login, token is invalid
                localStorage.removeItem('dtm_sid');
                showMessage('Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.', 'error');
            } else if (savedSid) {
                // Try auto login
                document.getElementById('appLoader') && (document.getElementById('appLoader').style.display = 'flex');
                top.location.href = window.location.href.split('?')[0] + '?sid=' + savedSid;
            }
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId + '-section').classList.add('active');
            
            const msgBox = document.getElementById('global-msg');
            msgBox.style.display = 'none';
        }

        function showMessage(msg, type) {
            const msgBox = document.getElementById('global-msg');
            msgBox.textContent = msg;
            msgBox.className = 'msg-box msg-' + type;
            msgBox.style.display = 'block';
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Navigate top frame safely from GAS sandbox iframe
        function navigateTopFrame(url) {
            localStorage.setItem('dtm_sid', url.split('sid=')[1] || '');
            var a = document.createElement('a');
            a.href = url;
            a.target = '_top';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            try { document.body.removeChild(a); } catch(e) {}
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.email.value;
            const password = form.password.value;
            setLoading('btnLogin', true);
            
            var APP_URL = '<?= data.appUrl ?>';
            
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        showMessage('Đăng nhập thành công! Đang vào hệ thống...', 'success');
                        var sid = response.data.sessionId;
                        var url = APP_URL + '?sid=' + sid;
                        // Small delay for message to show, then navigate
                        setTimeout(function() { navigateTopFrame(url); }, 600);
                    } else {
                        showMessage(response.message, 'error');
                        setLoading('btnLogin', false);
                    }
                })
                .withFailureHandler(function(err) {
                    showMessage('Lỗi kết nối máy chủ: ' + (err.message || err), 'error');
                    setLoading('btnLogin', false);
                })
                .login(email, password);
        }

        function handleGoogleLogin() {
            setLoading('btnGoogleLogin', true);
            
            var APP_URL = '<?= data.appUrl ?>';
            
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        showMessage('Đăng nhập Google thành công! Đang vào hệ thống...', 'success');
                        var sid = response.data.sessionId;
                        var url = APP_URL + '?sid=' + sid;
                        setTimeout(function() { navigateTopFrame(url); }, 600);
                    } else {
                        showMessage(response.message, 'error');
                        setLoading('btnGoogleLogin', false);
                    }
                })
                .withFailureHandler(function(err) {
                    showMessage('Lỗi kết nối máy chủ: ' + (err.message || err), 'error');
                    setLoading('btnGoogleLogin', false);
                })
                .loginWithGoogle();
        }

        function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                email: form.email.value,
                name: form.name.value,
                phone: form.phone.value,
                dob: form.dob.value,
                gender: form.gender.value,
                address: form.address.value,
                password: form.password.value
            };
            
            if (data.password.length < 6) {
                showMessage('Mật khẩu phải từ 6 ký tự trở lên.', 'error');
                return;
            }
            
            setLoading('btnRegister', true);
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        showMessage('Đăng ký thành công! Vui lòng đăng nhập.', 'success');
                        form.reset();
                        setTimeout(() => {
                             switchTab('login');
                             document.querySelectorAll('.tab')[0].classList.add('active');
                             document.querySelectorAll('.tab')[1].classList.remove('active');
                        }, 2000);
                    } else {
                        showMessage(response.message, 'error');
                    }
                    setLoading('btnRegister', false);
                })
                .withFailureHandler(function(err) {
                    showMessage('Lỗi mạng: ' + err.message, 'error');
                    setLoading('btnRegister', false);
                })
                .registerUser(data);
        }
    </script>
</body>
</html>
