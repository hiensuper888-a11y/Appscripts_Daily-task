<!-- VerifyView.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực Email - Daily Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #4f46e5, #0ea5e9, #06b6d4, #6366f1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Icon States --- */
        .icon-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 38px;
        }

        .icon-loading { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
        .icon-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .icon-error   { background: rgba(239, 68, 68, 0.1);  color: var(--error); }

        /* Spinning loader circle */
        .spinner-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 5px solid rgba(79, 70, 229, 0.15);
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .highlight {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: rgba(79, 70, 229, 0.07);
            color: var(--primary);
        }
        .btn-secondary:hover {
            background: rgba(79, 70, 229, 0.15);
            box-shadow: none;
        }

        #state-loading, #state-success, #state-error { display: none; }
        #state-loading.show, #state-success.show, #state-error.show { display: block; }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- App Logo -->
        <img src="<?= CONFIG.LOGO_URL ?>" alt="App Logo" class="logo"
             onerror="this.style.display='none'">

        <!-- === STATE: LOADING === -->
        <div id="state-loading" class="show">
            <div class="spinner-ring"></div>
            <h1>Đang xác thực tài khoản...</h1>
            <p>Vui lòng chờ trong giây lát, hệ thống đang xử lý yêu cầu của bạn.</p>
        </div>

        <!-- === STATE: SUCCESS === -->
        <div id="state-success">
            <div class="icon-wrap icon-success">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Xác thực thành công! 🎉</h1>
            <p>Email của bạn đã được xác nhận.</p>
            <p>Tài khoản <span class="highlight" id="successEmail"></span> đã được kích hoạt hoàn toàn.</p>
            <a id="loginBtn" href="#" class="btn" onclick="goToLogin()">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập ngay
            </a>
        </div>

        <!-- === STATE: ERROR === -->
        <div id="state-error">
            <div class="icon-wrap icon-error">
                <i class="fas fa-times-circle"></i>
            </div>
            <h1 id="errorTitle">Xác thực thất bại</h1>
            <p id="errorMsg">Đường link xác thực không hợp lệ hoặc đã hết hạn.</p>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <a href="#" class="btn btn-secondary" onclick="goToLogin()">
                    <i class="fas fa-home"></i> Về trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        // We read the token injected straight from the server context
        var token = '<?= token ?>';

        function setState(state) {
            ['loading','success','error'].forEach(function(s) {
                var el = document.getElementById('state-' + s);
                if (el) el.className = s === state ? 'show' : '';
            });
        }

        function goToLogin() {
            top.location.href = '<?= appUrl ?>';
        }

        // Auto-run verification on page load
        window.addEventListener('DOMContentLoaded', function() {
            if (!token) {
                setState('error');
                document.getElementById('errorTitle').textContent = 'Thiếu mã xác thực';
                document.getElementById('errorMsg').textContent  = 'Đường link không hợp lệ. Vui lòng kiểm tra lại email và thử lại.';
                return;
            }

            setState('loading');

            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        setState('success');
                        // Try to show the active google email
                        google.script.run
                            .withSuccessHandler(function(email){ 
                                var el = document.getElementById('successEmail');
                                if (el && email) el.textContent = email;
                            })
                            .withFailureHandler(function(){})
                            .getActiveUserEmail();
                    } else {
                        setState('error');
                        document.getElementById('errorMsg').textContent = response.message || 'Mã xác thực không hợp lệ hoặc đã được sử dụng.';
                    }
                })
                .withFailureHandler(function(err) {
                    setState('error');
                    document.getElementById('errorMsg').textContent = 'Lỗi kết nối máy chủ: ' + (err.message || err);
                })
                .verifyEmail(token);
        });
    </script>
</body>
</html>
