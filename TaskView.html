<!-- TaskView.html -->
<template id="tpl-tasks">
    <!-- Action Bar -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px;">
            <select class="form-control" id="taskFilterStatus" style="width: 150px; padding: 8px 12px;" onchange="loadTasks()">
                <option value="all">Tất cả trạng thái</option>
                <option value="pending">Chờ xử lý</option>
                <option value="in_progress">Đang làm</option>
                <option value="completed">Đã hoàn thành</option>
                <option value="overdue">Quá hạn</option>
            </select>
            <button class="btn btn-secondary" onclick="loadTasks()"><i class="fas fa-sync"></i></button>
        </div>
        
        <button class="btn btn-primary" onclick="openCreateTaskModal()">
            <i class="fas fa-plus"></i> Tạo công việc mới
        </button>
    </div>

    <!-- Kanban Board -->
    <div class="kanban-board" id="kanbanBoard">
        <!-- Chờ Xử Lý -->
        <div class="kanban-column col-pending" id="col-pending">
            <div class="column-header">
                <h3 style="font-size: 15px; margin:0;"><i class="fas fa-clipboard-list" style="color:var(--status-pending)"></i> Chờ xử lý</h3>
                <span class="badge badge-pending" id="count-pending">0</span>
            </div>
            <div class="task-cards" id="list-pending" ondrop="drop(event, 'pending')" ondragover="allowDrop(event)">
                <div class="loader" style="margin: 20px auto;"></div>
            </div>
        </div>
        
        <!-- Đang Làm -->
        <div class="kanban-column col-inprogress" id="col-in_progress">
            <div class="column-header">
                <h3 style="font-size: 15px; margin:0;"><i class="fas fa-spinner fa-spin" style="color:var(--status-in-progress)"></i> Đang làm</h3>
                <span class="badge badge-in-progress" id="count-in_progress">0</span>
            </div>
            <div class="task-cards" id="list-in_progress" ondrop="drop(event, 'in_progress')" ondragover="allowDrop(event)">
            </div>
        </div>
        
        <!-- Đã Xong -->
        <div class="kanban-column col-completed" id="col-completed">
            <div class="column-header">
                <h3 style="font-size: 15px; margin:0;"><i class="fas fa-check-circle" style="color:var(--status-completed)"></i> Hoàn thành</h3>
                <span class="badge badge-completed" id="count-completed">0</span>
            </div>
            <div class="task-cards" id="list-completed" ondrop="drop(event, 'completed')" ondragover="allowDrop(event)">
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title" id="taskModalTitle">Tạo công việc mới</h3>
                <button class="modal-close" onclick="closeModal('taskModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="taskForm" onsubmit="handleSaveTask(event)">
                    <div class="form-group">
                        <label class="form-label">Tiêu đề <span style="color:red">*</span></label>
                        <input type="text" class="form-control" name="title" required placeholder="Nhập tên nhiệm vụ">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Mô tả chi tiết</label>
                        <textarea class="form-control" name="description" rows="4" placeholder="Mô tả công việc cần làm..."></textarea>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Độ ưu tiên</label>
                            <select class="form-control" name="priority">
                                <option value="low">Thấp</option>
                                <option value="medium" selected>Trung bình</option>
                                <option value="high">Cao</option>
                                <option value="urgent">Khẩn cấp !</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Hạn hoàn thành</label>
                            <input type="datetime-local" class="form-control" name="dueDate">
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Người thực hiện</label>
                            <select class="form-control" name="assignedTo" id="taskAssignee">
                                <option value="">-- Giao cho chính mình --</option>
                                <!-- Async load members -->
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Thuộc nhóm</label>
                            <select class="form-control" name="groupId" id="taskGroup">
                                <option value="">-- Không thuộc nhóm --</option>
                                <!-- Async load groups -->
                            </select>
                        </div>
                    </div>
                    
                     <div style="text-align: right; margin-top: 20px;">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('taskModal')">Hủy</button>
                        <button type="submit" class="btn btn-primary" id="btnSaveTask">
                            <i class="fas fa-save"></i> Lưu công việc
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>

<script>
    let globalTasksCache = [];

    function initTasks() {
        loadTasks();
        // Load dependencies for dropdowns 
        loadTaskDropdownData();
    }
    
    function loadTaskDropdownData() {
        if(!window.CURRENT_USER) return;
        // Set self
        const select = document.getElementById('taskAssignee');
        select.innerHTML = `<option value="${window.CURRENT_USER.userId}">Bạn (${window.CURRENT_USER.email})</option>`;
        
        // This would be replaced with actual Group fetch later
        // window.server.withSuccessHandler(...).getGroups();
    }

    function loadTasks() {
        const status = document.getElementById('taskFilterStatus').value;
        const lists = ['pending', 'in_progress', 'completed'];
        
        lists.forEach(l => {
            document.getElementById(`list-${l}`).innerHTML = '<div class="loader" style="margin: 20px auto;"></div>';
        });

        window.server
            .withSuccessHandler(res => {
                if (res.success) {
                    globalTasksCache = res.data;
                    renderKanban(globalTasksCache);
                } else {
                    showToast(res.message, 'error');
                }
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
            })
            .getMyTasks({ status: status === 'all' ? null : status }); // Fetch all, then group
    }
    
    function renderKanban(tasks) {
        const lists = {
            'pending': [],
            'in_progress': [],
            'completed': [],
            'overdue': [] // visual override to pending for kanban dropping logic simplicity
        };
        
        tasks.forEach(task => {
            // Treat overdue visually inside pending if not handled with separate column
            const mappedStatus = task.status === 'overdue' ? 'pending' : task.status;
            if(lists[mappedStatus]) {
                lists[mappedStatus].push(task);
            }
        });
        
        ['pending', 'in_progress', 'completed'].forEach(status => {
            const container = document.getElementById(`list-${status}`);
            const countBadge = document.getElementById(`count-${status}`);
            
            countBadge.innerText = lists[status].length;
            container.innerHTML = '';
            
            if (lists[status].length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-size:13px; border: 1px dashed var(--border-color); border-radius: 6px;">Kéo thả vào đây</div>`;
                return;
            }
            
            lists[status].forEach(task => {
                let dueHtml = '';
                if (task.dueDate) {
                    const ddStr = new Date(task.dueDate).toLocaleDateString();
                    dueHtml = `<span style="${task.status==='overdue'?'color:var(--danger);font-weight:600':''}"><i class="far fa-calendar"></i> ${ddStr}</span>`;
                }
                
                const card = document.createElement('div');
                card.className = `task-card priority-${task.priority}`;
                card.draggable = true;
                card.id = `task-${task.taskId}`;
                card.dataset.id = task.taskId;
                
                card.addEventListener('dragstart', dragStart);
                
                card.innerHTML = `
                    <div style="font-size: 11px; margin-bottom: 5px; opacity: 0.7;">
                        ${task.groupId ? '<i class="fas fa-users"></i> Nhóm' : '<i class="fas fa-user"></i> Cá nhân'}
                    </div>
                    <div class="task-title">${task.title}</div>
                    <div class="task-meta" style="margin-bottom: 8px;">
                        ${getPriorityText(task.priority)}
                        ${task.status === 'overdue' ? getStatusBadge('overdue') : ''}
                    </div>
                    <div class="task-meta">
                        ${dueHtml}
                        <span><i class="far fa-comment"></i> 0</span>
                    </div>
                `;
                
                card.onclick = () => showTaskDetail(task);
                container.appendChild(card);
            });
        });
    }

    // --- Drag and Drop Logic ---
    function dragStart(e) {
        e.dataTransfer.setData('text/plain', e.target.dataset.id);
        setTimeout(() => e.target.style.opacity = '0.5', 0);
    }
    
    function allowDrop(e) {
        e.preventDefault();
        e.currentTarget.style.backgroundColor = 'rgba(0,0,0,0.02)';
    }
    
    function drop(e, newStatus) {
        e.preventDefault();
        const container = e.currentTarget;
        container.style.backgroundColor = 'transparent';
        
        const taskId = e.dataTransfer.getData('text/plain');
        if (!taskId) return;
        
        const card = document.getElementById(`task-${taskId}`);
        if(card) {
            card.style.opacity = '1';
            
            // Don't update if dropped in same column
            // We need to implement server update
            showToast('Đang cập nhật...', 'info');
            
            window.server
                .withSuccessHandler(res => {
                    if(res.success) {
                        loadTasks(); // reload full board to apply logic correctly
                    } else {
                        showToast(res.message, 'error');
                        loadTasks(); // rollback visual
                    }
                })
                .withFailureHandler(err => {
                    showToast(err.message, 'error');
                    loadTasks();
                })
                .updateTaskStatus(taskId, newStatus);
        }
    }

    // --- Modals ---
    function openCreateTaskModal() {
        document.getElementById('taskForm').reset();
        
        // Default Due date to End of Today
        const now = new Date();
        now.setHours(23, 59);
        // Need string format YYYY-MM-DDThh:mm
        const tzoffset = (new Date()).getTimezoneOffset() * 60000;
        const localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);
        
        document.forms['taskForm'].dueDate.value = localISOTime;
        
        document.getElementById('taskModalTitle').innerText = 'Tạo công việc mới';
        openModal('taskModal');
    }
    
    function handleSaveTask(e) {
        e.preventDefault();
        const form = e.target;
        
        const data = {
            title: form.title.value,
            description: form.description.value,
            priority: form.priority.value,
            dueDate: form.dueDate.value,
            assignedTo: form.assignedTo.value,
            groupId: form.groupId.value
        };
        
        setBtnLoading('btnSaveTask', true);
        
        window.server
            .withSuccessHandler(res => {
                if(res.success) {
                    showToast(res.message, 'success');
                    closeModal('taskModal');
                    loadTasks();
                } else {
                    showToast(res.message, 'error');
                }
                setBtnLoading('btnSaveTask', false);
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
                setBtnLoading('btnSaveTask', false);
            })
            .createTask(data);
    }
    
    function showTaskDetail(task) {
        const body = `
            <div>
                <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                    <div>${getStatusBadge(task.status)} ${task.status === 'overdue' ? getStatusBadge('overdue') : ''}</div>
                    <div>${getPriorityText(task.priority)}</div>
                </div>
                
                <h2 style="font-size:22px; margin-bottom: 10px;">${task.title}</h2>
                <div style="padding: 15px; background: rgba(0,0,0,0.02); border-radius: 8px; margin-bottom: 20px; white-space: pre-wrap; font-size: 14px;">${task.description || '(Không có mô tả)'}</div>
                
                <div class="grid-2">
                    <div style="margin-bottom: 15px;">
                        <span style="color:var(--text-secondary); font-size: 12px; display:block;">Người tạo</span>
                        <strong>${task.createdByName}</strong>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <span style="color:var(--text-secondary); font-size: 12px; display:block;">Người thực hiện</span>
                        <strong>${task.assignedToName}</strong>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <span style="color:var(--text-secondary); font-size: 12px; display:block;">Hạn chót</span>
                        <strong>${task.dueDate ? new Date(task.dueDate).toLocaleString('vi-VN') : 'Không có'}</strong>
                    </div>
                </div>
            </div>
        `;
        
        configureModal({
            title: 'Chi tiết Công việc',
            body: body,
            size: 'lg',
            actionText: 'Xóa việc này',
            actionClass: 'btn-danger',
            onAction: function() {
                showConfirm('Bạn có chắc chắn muốn xóa việc này? Hành động này không thể hoàn tác.', () => {
                    closeModal('globalModal');
                    window.server
                        .withSuccessHandler(r => { 
                            showToast(r.message, r.success?'success':'error'); 
                            if(r.success) loadTasks();
                        })
                        .deleteTask(task.taskId);
                });
            }
        });
    }
</script>
