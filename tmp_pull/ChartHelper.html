<!-- ChartHelper.html -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    /**
     * ChartHelper - Utility for rendering Chart.js charts
     */
    const ChartHelper = {
        instances: {},
        
        // Default color palette matching CSS theme
        colors: {
            primary: '#667eea',
            secondary: '#764ba2',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            info: '#3b82f6',
            gray: '#9ca3af'
        },
        
        // Status colors mapping
        statusColors: {
            'pending': '#f59e0b',
            'in_progress': '#3b82f6',
            'completed': '#10b981',
            'overdue': '#ef4444'
        },

        /**
         * Initialize or Update a Pie Chart (Status distribution)
         */
        renderStatusPieChart(canvasId, data, title) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            // Destroy existing instance if it exists
            if (this.instances[canvasId]) {
                this.instances[canvasId].destroy();
            }
            
            const labels = [];
            const values = [];
            const backgroundColors = [];
            
            // Process data: expected format { 'pending': 5, 'completed': 10, ... }
            const statusMap = {
                'pending': 'Chờ xử lý',
                'in_progress': 'Đang làm',
                'completed': 'Hoàn thành',
                'overdue': 'Quá hạn'
            };
            
            for (const [key, val] of Object.entries(data)) {
                if(val > 0) {
                    labels.push(statusMap[key] || key);
                    values.push(val);
                    backgroundColors.push(this.statusColors[key] || this.colors.gray);
                }
            }
            
            if (values.length === 0) {
                // Render empty state chart
                labels.push('Không có dữ liệu');
                values.push(1);
                backgroundColors.push('#e5e7eb');
            }
            
            Chart.defaults.font.family = "'Outfit', sans-serif";
            Chart.defaults.color = document.body.classList.contains('dark-mode') ? '#d1d5db' : '#4b5563';

            this.instances[canvasId] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: backgroundColors,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom' },
                        title: {
                            display: !!title,
                            text: title || '',
                            font: { size: 16, weight: '600' }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    if (label && label !== 'Không có dữ liệu') {
                                        label += ': ' + context.raw + ' tasks';
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        },

        /**
         * Initialize or Update a Bar Chart (Tasks by Date)
         */
        renderTasksBarChart(canvasId, labels, dataSets, title) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            if (this.instances[canvasId]) {
                this.instances[canvasId].destroy();
            }
            
            Chart.defaults.font.family = "'Outfit', sans-serif";
            Chart.defaults.color = document.body.classList.contains('dark-mode') ? '#d1d5db' : '#4b5563';
            
            const gridColor = document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

            this.instances[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: dataSets.map(ds => ({
                        label: ds.label,
                        data: ds.data,
                        backgroundColor: ds.color || this.colors.primary,
                        borderRadius: 4,
                        borderWidth: 0
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 },
                            grid: { color: gridColor }
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        title: {
                            display: !!title,
                            text: title || '',
                            font: { size: 16, weight: '600' }
                        }
                    }
                }
            });
        },
        
        /**
         * Auto update theming when dark mode is toggled
         */
        updateTheme() {
            const isDark = document.body.classList.contains('dark-mode');
            const color = isDark ? '#d1d5db' : '#4b5563';
            const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            
            Chart.defaults.color = color;
            
            for (const instance of Object.values(this.instances)) {
                if (instance.config.type === 'bar') {
                    if (instance.options.scales.y) {
                        instance.options.scales.y.grid.color = gridColor;
                    }
                }
                instance.update();
            }
        }
    };
</script>
