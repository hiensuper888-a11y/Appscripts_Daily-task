<!-- ProfileView.html -->
<template id="tpl-profile">
    <div class="grid-2">
        <!-- Thông tin hồ sơ -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Hồ sơ cá nhân</h3>
            </div>
            
            <div style="display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid var(--border-color);">
                <div style="position: relative; margin-right: 20px;">
                    <div id="profileAvatarBig" class="avatar" style="width: 80px; height: 80px; font-size: 32px;"></div>
                    <label for="avatarUpload" style="position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <i class="fas fa-camera" style="font-size: 12px;"></i>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
                </div>
                <div>
                    <h3 id="profileNameDisplay" style="font-size: 20px; font-weight: 600; margin-bottom: 5px;"></h3>
                    <p style="color: var(--text-secondary); margin-bottom: 5px;">
                        <i class="fas fa-envelope" style="width: 20px;"></i> <span id="profileEmailDisplay"></span>
                    </p>
                    <span id="profileRoleBadge"></span>
                </div>
            </div>
            
            <form id="profileForm" onsubmit="handleUpdateProfile(event)">
                <div class="grid-2" style="margin-bottom: 0; gap: 15px;">
                    <div class="form-group">
                        <label class="form-label">Họ và Tên</label>
                        <input type="text" class="form-control" name="name" id="profileName" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control" name="phone" id="profilePhone" required>
                    </div>
                </div>
                
                <div class="grid-2" style="margin-bottom: 0; gap: 15px;">
                    <div class="form-group">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" class="form-control" name="dob" id="profileDob">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Giới tính</label>
                        <select class="form-control" name="gender" id="profileGender">
                            <option value="male">Nam</option>
                            <option value="female">Nữ</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Địa chỉ</label>
                    <input type="text" class="form-control" name="address" id="profileAddress">
                </div>
                
                <div style="text-align: right; margin-top: 25px;">
                    <button type="submit" class="btn btn-primary" id="btnUpdateProfile">
                        <i class="fas fa-save"></i> Cập nhật hồ sơ
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Đổi mật khẩu & Phản hồi -->
        <div>
            <!-- Card đổi mật khẩu -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Đổi mật khẩu ứng dụng</h3>
                </div>
                <form id="passwordForm" onsubmit="handleChangePassword(event)">
                    <div class="form-group">
                        <label class="form-label">Mật khẩu cũ</label>
                        <input type="password" class="form-control" name="oldPassword" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" class="form-control" name="newPassword" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Xác nhận mật khẩu mới</label>
                        <input type="password" class="form-control" name="confirmPassword" required minlength="6">
                    </div>
                    
                    <div style="text-align: right;">
                        <button type="submit" class="btn btn-primary" id="btnChangePassword">
                            <i class="fas fa-key"></i> Đổi mật khẩu
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Card Gửi phản hồi -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Góp ý & Báo lỗi hệ thống</h3>
                </div>
                <form id="feedbackForm" onsubmit="handleSendFeedback(event)">
                    <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 15px;">
                        Mọi ý kiến đóng góp của bạn sẽ được gửi trực tiếp đến Ban quản trị (lythanhthao100@gmail.com).
                    </p>
                    <div class="form-group">
                        <textarea class="form-control" name="content" rows="4" required placeholder="Nhập nội dung góp ý hoặc mô tả lỗi bạn gặp phải..."></textarea>
                    </div>
                    
                    <div style="text-align: right;">
                        <button type="submit" class="btn btn-outline" id="btnSendFeedback">
                            <i class="fas fa-paper-plane"></i> Gửi phản hồi
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>

<script>
    // ----- Profile Controller -----
    
    function initProfile() {
        if (!window.CURRENT_USER) return;
        
        const user = window.CURRENT_USER;
        
        // Fill display
        document.getElementById('profileAvatarBig').innerText = user.name.charAt(0).toUpperCase();
        document.getElementById('profileNameDisplay').innerText = user.name;
        document.getElementById('profileEmailDisplay').innerText = user.email;
        
        const roleText = user.role === 'admin' ? 'Quản trị viên' : 'Người dùng';
        const roleClass = user.role === 'admin' ? 'badge-in-progress' : 'badge-completed';
        document.getElementById('profileRoleBadge').innerHTML = `<span class="badge ${roleClass}">${roleText}</span>`;
        
        // Fill form
        document.getElementById('profileName').value = user.name || '';
        document.getElementById('profilePhone').value = user.phone || '';
        document.getElementById('profileAddress').value = user.address || '';
        document.getElementById('profileGender').value = user.gender || 'other';
        
        if (user.dob) {
            try {
                // Need to format to YYYY-MM-DD for input[type=date]
                const d = new Date(user.dob);
                const isoDate = d.toISOString().split('T')[0];
                document.getElementById('profileDob').value = isoDate;
            } catch(e) {}
        }
    }
    
    function handleUpdateProfile(e) {
        e.preventDefault();
        const form = e.target;
        
        const data = {
            name: form.name.value,
            phone: form.phone.value,
            dob: form.dob.value, // YYYY-MM-DD
            gender: form.gender.value,
            address: form.address.value
        };
        
        // Convert YYYY-MM-DD to DD/MM/YYYY for backend
        if (data.dob) {
            const parts = data.dob.split('-');
            data.dob = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        
        setBtnLoading('btnUpdateProfile', true, '<i class="fas fa-save"></i> Cập nhật hồ sơ');
        
        google.script.run
            .withSuccessHandler(res => {
                if(res.success) {
                    showToast(res.message, 'success');
                    
                    // Update local user state
                    window.CURRENT_USER = res.data;
                    document.getElementById('sidebarName').innerText = res.data.name;
                    document.getElementById('sidebarAvatar').innerText = res.data.name.charAt(0).toUpperCase();
                    initProfile(); // re-fill
                } else {
                    showToast(res.message, 'error');
                }
                setBtnLoading('btnUpdateProfile', false, '<i class="fas fa-save"></i> Cập nhật hồ sơ');
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
                setBtnLoading('btnUpdateProfile', false, '<i class="fas fa-save"></i> Cập nhật hồ sơ');
            })
            .updateProfile(data);
    }
    
    function handleChangePassword(e) {
        e.preventDefault();
        const form = e.target;
        
        const oldPass = form.oldPassword.value;
        const newPass = form.newPassword.value;
        const confirmPass = form.confirmPassword.value;
        
        if (newPass !== confirmPass) {
            showToast('Mật khẩu mới không khớp.', 'error');
            return;
        }
        
        setBtnLoading('btnChangePassword', true, '<i class="fas fa-key"></i> Đổi mật khẩu');
        
        google.script.run
            .withSuccessHandler(res => {
                if(res.success) {
                    showToast(res.message, 'success');
                    form.reset();
                } else {
                    showToast(res.message, 'error');
                }
                setBtnLoading('btnChangePassword', false, '<i class="fas fa-key"></i> Đổi mật khẩu');
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
                setBtnLoading('btnChangePassword', false, '<i class="fas fa-key"></i> Đổi mật khẩu');
            })
            .changePassword(oldPass, newPass);
    }
    
    function handleAvatarUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.size > 2 * 1024 * 1024) {
            showToast('Hình ảnh không được vượt quá 2MB', 'error');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = {
                data: event.target.result,
                mimeType: file.type,
                filename: file.name
            };
            
            showToast('Đang tải ảnh lên...', 'info');
            
            google.script.run
                .withSuccessHandler(res => {
                    if(res.success) {
                        showToast(res.message, 'success');
                        // Backend won't return local base64, so we simulate Avatar UI changes for now
                        document.getElementById('profileAvatarBig').style.backgroundImage = `url('${event.target.result}')`;
                        document.getElementById('profileAvatarBig').style.backgroundSize = 'cover';
                        document.getElementById('profileAvatarBig').innerText = '';
                        
                        document.getElementById('sidebarAvatar').style.backgroundImage = `url('${event.target.result}')`;
                        document.getElementById('sidebarAvatar').style.backgroundSize = 'cover';
                        document.getElementById('sidebarAvatar').innerText = '';
                    } else {
                        showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => {
                    showToast(err.message, 'error');
                })
                .uploadAvatar(JSON.stringify(data));
        };
        reader.readAsDataURL(file);
    }
    
    function handleSendFeedback(e) {
        e.preventDefault();
        const form = e.target;
        const content = form.content.value;
        
        setBtnLoading('btnSendFeedback', true, '<i class="fas fa-paper-plane"></i> Gửi phản hồi');
        
        google.script.run
            .withSuccessHandler(res => {
                showToast('Đã gửi phản hồi Cảm ơn bạn!', 'success');
                form.reset();
                setBtnLoading('btnSendFeedback', false, '<i class="fas fa-paper-plane"></i> Gửi phản hồi');
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
                setBtnLoading('btnSendFeedback', false, '<i class="fas fa-paper-plane"></i> Gửi phản hồi');
            })
            // Temporary, will be defined in AdminController
            .submitSystemFeedback(content);
    }
</script>
