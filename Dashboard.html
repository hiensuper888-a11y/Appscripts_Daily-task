<!-- Dashboard.html -->
<template id="tpl-dashboard">
    <!-- Stat Cards -->
    <div class="grid-4" id="dashboardStatsGrid">
        <!-- Rendered via JS -->
    </div>
    
    <div class="grid-2">
        <!-- Charts -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Tỷ lệ hoàn thành</h3>
                <button class="btn btn-outline" onclick="loadDashboardStats()"><i class="fas fa-sync"></i></button>
            </div>
            <div style="height: 300px; position: relative;">
                <canvas id="dashboardPieChart"></canvas>
            </div>
        </div>
        
        <!-- Upcoming Tasks -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Nhiệm vụ sắp đến hạn</h3>
                <button class="btn btn-outline" onclick="app.navigate('tasks')">Xem tất cả</button>
            </div>
            <div id="dashboardUpcomingTasks">
                <!-- Data here -->
                <div class="loader" style="margin: 30px auto;"></div>
            </div>
        </div>
    </div>
</template>

<script>
    function initDashboard() {
        loadDashboardStats();
    }
    
    function loadDashboardStats() {
        const statsGrid = document.getElementById('dashboardStatsGrid');
        const upcomingContainer = document.getElementById('dashboardUpcomingTasks');
        
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="loader" style="margin:auto;"></div></div>
            <div class="stat-card"><div class="loader" style="margin:auto;"></div></div>
            <div class="stat-card"><div class="loader" style="margin:auto;"></div></div>
            <div class="stat-card"><div class="loader" style="margin:auto;"></div></div>
        `;
        
        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    const data = res.data;
                    
                    // Render Cards
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-icon" style="background-color: rgba(59,130,246,0.1); color: var(--info);">
                                <i class="fas fa-tasks"></i>
                            </div>
                            <div class="stat-info">
                                <h3>${data.total}</h3>
                                <p>Tổng nhiệm vụ</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="background-color: rgba(16,185,129,0.1); color: var(--success);">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="stat-info">
                                <h3>${data.completed}</h3>
                                <p>Đã hoàn thành</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="background-color: rgba(245,158,11,0.1); color: var(--warning);">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="stat-info">
                                <h3>${data.pending}</h3>
                                <p>Đang chờ xử lý</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="background-color: rgba(239,68,68,0.1); color: var(--danger);">
                                <i class="fas fa-exclamation-circle"></i>
                            </div>
                            <div class="stat-info">
                                <h3>${data.overdue}</h3>
                                <p>Quá hạn</p>
                            </div>
                        </div>
                    `;
                    
                    // Render Pie Chart using ChartHelper
                    ChartHelper.renderStatusPieChart('dashboardPieChart', {
                        'pending': data.pending,
                        'in_progress': data.in_progress,
                        'completed': data.completed,
                        'overdue': data.overdue
                    });
                    
                    // Render Upcoming Tasks
                    if (data.upcoming && data.upcoming.length > 0) {
                        let html = '';
                        data.upcoming.forEach(task => {
                            const dateStr = new Date(task.dueDate).toLocaleDateString();
                            html += `
                                <div class="task-card" onclick="app.navigate('tasks')">
                                    <div class="task-title">${task.title}</div>
                                    <div class="task-meta">
                                        <span><i class="far fa-calendar"></i> Hạn: ${dateStr}</span>
                                        ${getStatusBadge(task.status)}
                                    </div>
                                </div>
                            `;
                        });
                        upcomingContainer.innerHTML = html;
                    } else {
                        upcomingContainer.innerHTML = `
                            <div style="text-align:center; padding: 40px 0; color: var(--text-secondary);">
                                <i class="fas fa-laugh-beam" style="font-size: 32px; color: var(--success); margin-bottom: 15px;"></i>
                                <p>Tuyệt vời! Bạn không có nhiệm vụ nào sắp đến hạn.</p>
                            </div>
                        `;
                    }
                }
            })
            .withFailureHandler(err => {
                showToast(err.message, 'error');
            })
            .getDashboardStats();
    }
</script>
