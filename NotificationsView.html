<!-- NotificationsView.html -->
<template id="tpl-notifications">
    <div style="max-width: 720px; margin: 0 auto;">

        <!-- Header Bar -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
            <div>
                <h2 style="font-size: 20px; font-weight: 700; color: var(--text-primary); margin: 0;">
                    <i class="fas fa-bell" style="color: var(--primary); margin-right: 10px;"></i>Thông báo
                </h2>
                <p style="color: var(--text-secondary); font-size: 13px; margin-top: 4px;">
                    Tất cả hoạt động và cập nhật của hệ thống
                </p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="notifUnreadCount" style="
                    background: var(--primary);
                    color: white;
                    font-size: 12px;
                    font-weight: 600;
                    padding: 3px 10px;
                    border-radius: 20px;
                    display: none;
                "></span>
                <button class="btn btn-outline" id="btnMarkAllRead" onclick="markAllNotificationsRead()" style="font-size: 13px; padding: 7px 14px;">
                    <i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc
                </button>
                <button class="btn btn-outline" onclick="loadNotifications()" style="font-size: 13px; padding: 7px 14px;">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div style="display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0;">
            <button onclick="filterNotifications('all')" id="notifTab-all"
                style="padding: 10px 18px; border: none; background: none; cursor: pointer;
                       color: var(--primary); border-bottom: 3px solid var(--primary);
                       font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.2s;">
                Tất cả
            </button>
            <button onclick="filterNotifications('unread')" id="notifTab-unread"
                style="padding: 10px 18px; border: none; background: none; cursor: pointer;
                       color: var(--text-secondary); border-bottom: 3px solid transparent;
                       font-size: 14px; font-weight: 500; font-family: inherit; transition: all 0.2s;">
                Chưa đọc
            </button>
        </div>

        <!-- Notifications List -->
        <div id="notificationsList">
            <div class="loader" style="margin: 60px auto;"></div>
        </div>

    </div>
</template>

<script>
    var _notifData = [];
    var _notifFilter = 'all';

    function initNotifications() {
        loadNotifications();
    }

    function loadNotifications() {
        const list = document.getElementById('notificationsList');
        list.innerHTML = '<div class="loader" style="margin: 60px auto;"></div>';

        google.script.run
            .withSuccessHandler(function(res) {
                if (res.success) {
                    _notifData = res.data || [];
                    renderNotifications(_notifData);
                    updateUnreadBadge(_notifData);
                } else {
                    list.innerHTML = renderEmptyState('Lỗi tải dữ liệu', res.message, 'fa-exclamation-circle', 'var(--danger)');
                }
            })
            .withFailureHandler(function(err) {
                list.innerHTML = renderEmptyState('Mất kết nối', err.message, 'fa-wifi', 'var(--danger)');
            })
            .getAllNotifications();
    }

    function filterNotifications(filter) {
        _notifFilter = filter;

        // Update tab styles
        ['all', 'unread'].forEach(function(tab) {
            const btn = document.getElementById('notifTab-' + tab);
            if (!btn) return;
            if (tab === filter) {
                btn.style.color = 'var(--primary)';
                btn.style.borderBottomColor = 'var(--primary)';
                btn.style.fontWeight = '600';
            } else {
                btn.style.color = 'var(--text-secondary)';
                btn.style.borderBottomColor = 'transparent';
                btn.style.fontWeight = '500';
            }
        });

        const filtered = filter === 'unread'
            ? _notifData.filter(function(n) { return !n.isRead; })
            : _notifData;

        renderNotifications(filtered);
    }

    function renderNotifications(data) {
        const list = document.getElementById('notificationsList');

        if (!data || data.length === 0) {
            list.innerHTML = renderEmptyState(
                _notifFilter === 'unread' ? 'Không có thông báo chưa đọc' : 'Chưa có thông báo nào',
                'Mọi hoạt động và cập nhật sẽ xuất hiện tại đây.',
                'fa-bell-slash',
                'var(--text-secondary)'
            );
            return;
        }

        let html = '';
        data.forEach(function(notif) {
            const icon = getNotifIcon(notif.type);
            const timeAgo = getTimeAgo(notif.createdAt);
            const unreadStyle = !notif.isRead
                ? 'background: rgba(79, 70, 229, 0.04); border-left: 4px solid var(--primary);'
                : 'background: var(--card-bg); border-left: 4px solid transparent;';

            html += `
                <div class="card notif-item" id="notif-${notif.notifId}"
                    style="${unreadStyle} border-radius: 14px; padding: 18px 20px;
                           margin-bottom: 12px; display: flex; gap: 16px;
                           align-items: flex-start; cursor: pointer; transition: all 0.2s;
                           ${!notif.isRead ? '' : 'opacity: 0.75;'}"
                    onclick="handleNotifClick('${notif.notifId}', '${notif.type}', '${notif.relatedId || ''}')">

                    <!-- Icon -->
                    <div style="
                        width: 44px; height: 44px; flex-shrink: 0; border-radius: 12px;
                        display: flex; align-items: center; justify-content: center;
                        font-size: 18px; background: ${icon.bg}; color: ${icon.color};">
                        <i class="fas ${icon.fa}"></i>
                    </div>

                    <!-- Content -->
                    <div style="flex: 1; min-width: 0;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;">
                            <p style="font-weight: ${!notif.isRead ? '600' : '500'}; font-size: 14px;
                                      color: var(--text-primary); margin: 0 0 4px; line-height: 1.4;">
                                ${escapeHtml(notif.title)}
                            </p>
                            <span style="font-size: 11px; color: var(--text-secondary); flex-shrink:0; margin-top: 2px;">
                                ${timeAgo}
                            </span>
                        </div>
                        <p style="font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.5;">
                            ${escapeHtml(notif.message)}
                        </p>
                    </div>

                    <!-- Unread dot -->
                    ${!notif.isRead ? `
                        <div style="width: 10px; height: 10px; background: var(--primary);
                                    border-radius: 50%; margin-top: 6px; flex-shrink: 0;"></div>
                    ` : ''}
                </div>
            `;
        });

        list.innerHTML = html;
    }

    function handleNotifClick(notifId, type, relatedId) {
        // Mark as read
        const item = document.getElementById('notif-' + notifId);
        if (item) {
            item.style.background = 'var(--card-bg)';
            item.style.borderLeftColor = 'transparent';
            item.style.opacity = '0.75';
            const dot = item.querySelector('div[style*="border-radius: 50%"]');
            if (dot) dot.remove();
        }

        // Mark read on server
        google.script.run
            .withSuccessHandler(function() {
                // Update local data
                var notif = _notifData.find(function(n) { return n.notifId === notifId; });
                if (notif) { notif.isRead = true; }
                updateUnreadBadge(_notifData);
            })
            .withFailureHandler(function(){})
            .markNotificationRead(notifId);

        // Navigate to related content
        if (type === 'task' && relatedId) {
            app.navigate('tasks');
        } else if (type === 'group' && relatedId) {
            app.navigate('groups');
        } else if (type === 'chat' && relatedId) {
            app.navigate('chat');
        }
    }

    function markAllNotificationsRead() {
        const unread = _notifData.filter(function(n) { return !n.isRead; });
        if (unread.length === 0) { showToast('Không có thông báo nào chưa đọc.', 'info'); return; }

        setBtnLoading('btnMarkAllRead', true, '<i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc');

        google.script.run
            .withSuccessHandler(function(res) {
                setBtnLoading('btnMarkAllRead', false, '<i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc');
                if (res.success) {
                    _notifData.forEach(function(n) { n.isRead = true; });
                    renderNotifications(_notifFilter === 'unread' ? [] : _notifData);
                    updateUnreadBadge(_notifData);
                    showToast('Đã đánh dấu tất cả thông báo là đã đọc.', 'success');
                }
            })
            .withFailureHandler(function(err) {
                setBtnLoading('btnMarkAllRead', false, '<i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc');
                showToast('Lỗi: ' + err.message, 'error');
            })
            .markAllNotificationsRead();
    }

    function updateUnreadBadge(data) {
        const unreadCount = data.filter(function(n) { return !n.isRead; }).length;

        // Update badge in notification view header
        const badge = document.getElementById('notifUnreadCount');
        if (badge) {
            if (unreadCount > 0) {
                badge.textContent = unreadCount + ' chưa đọc';
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        // Also update the topbar bell badge
        const topBadge = document.getElementById('notifBadge');
        if (topBadge) {
            if (unreadCount > 0) {
                topBadge.textContent = unreadCount;
                topBadge.style.display = 'flex';
            } else {
                topBadge.style.display = 'none';
            }
        }
    }

    // === Helpers ===
    function getNotifIcon(type) {
        const icons = {
            'task':    { fa: 'fa-tasks',        bg: 'rgba(59,130,246,0.12)',  color: '#3b82f6' },
            'group':   { fa: 'fa-users',        bg: 'rgba(16,185,129,0.12)', color: '#10b981' },
            'chat':    { fa: 'fa-comment-dots', bg: 'rgba(6,182,212,0.12)',  color: '#06b6d4' },
            'system':  { fa: 'fa-cog',          bg: 'rgba(107,114,128,0.12)',color: '#6b7280' },
            'welcome': { fa: 'fa-hand-wave',    bg: 'rgba(245,158,11,0.12)', color: '#f59e0b' },
            'alert':   { fa: 'fa-exclamation-triangle', bg: 'rgba(239,68,68,0.12)', color: '#ef4444' }
        };
        return icons[type] || icons['system'];
    }

    function getTimeAgo(dateStr) {
        if (!dateStr) return '';
        try {
            var d = new Date(dateStr);
            var diff = (Date.now() - d.getTime()) / 1000;
            if (diff < 60)    return 'Vừa xong';
            if (diff < 3600)  return Math.floor(diff / 60) + ' phút trước';
            if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' ngày trước';
            return d.toLocaleDateString('vi-VN');
        } catch(e) { return ''; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
    }

    function renderEmptyState(title, msg, icon, color) {
        return `
            <div style="text-align: center; padding: 80px 20px; color: var(--text-secondary);">
                <i class="fas ${icon}" style="font-size: 52px; color: ${color}; margin-bottom: 20px; opacity: 0.7;"></i>
                <h3 style="font-size: 18px; margin-bottom: 10px; color: var(--text-primary);">${title}</h3>
                <p style="font-size: 14px; max-width: 320px; margin: 0 auto;">${msg}</p>
            </div>
        `;
    }
</script>
